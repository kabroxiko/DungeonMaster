name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test and build Go server
        run: |
          cd go
          go test ./...
          go build -o /tmp/gmai-server ./cmd/gmai-server
